name: Android Debug APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Cordova
      run: npm install -g cordova

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Install Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK packages
      run: |
        sdkmanager "platforms;android-33" "build-tools;33.0.2"

    # 🔑 THIS IS THE FIX
    - name: Install compatible Gradle (7.6)
      run: |
        wget https://services.gradle.org/distributions/gradle-7.6-bin.zip
        unzip gradle-7.6-bin.zip
        sudo mv gradle-7.6 /opt/gradle
        echo "/opt/gradle/bin" >> $GITHUB_PATH

    - name: Verify Gradle version
      run: gradle --version

    - name: Add Android platform (cordova-android 11)
      run: |
        cordova platform rm android || true
        cordova platform add android@11.0.0

    - name: Build Debug APK
      run: cordova build android --debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
